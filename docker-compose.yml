services:

  # PHP-FPM Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: btr_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-pupr}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-laravel}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "$$sock=@fsockopen('127.0.0.1', 9000, $$errno, $$errstr, 1); exit($$sock ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - btr_net

  # Nginx Web Server
  nginx:
    image: nginx:1.25-alpine
    container_name: btr_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - btr_net

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: btr_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-pupr}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - btr_net

  # phpMyAdmin (optional, for DB management)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: btr_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME:-laravel}
      PMA_PASSWORD: ${DB_PASSWORD:-laravel}
    depends_on:
      - db
    networks:
      - btr_net
    profiles:
      - tools

networks:
  btr_net:
    driver: bridge

volumes:
  dbdata:
    driver: local
